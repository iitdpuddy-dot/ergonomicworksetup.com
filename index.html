<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ergonomic Work Setup - Coming Soon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; color: #38bdf8; font-weight: 700; }
        p { font-size: 1.1rem; color: #94a3b8; margin-bottom: 35px; line-height: 1.6; }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 30px;
            background: #38bdf8;
            color: #0f172a;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
            transition: all 0.2s ease-in-out;
        }
        .btn:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ergonomic Work Setup</h1>
        <p>We are busy building a dedicated space for healthy, comfortable, and highly productive workspaces. In the meantime, check out our curated product reviews and comfort ideas over at our main store!</p>
        
        <!-- DIRECT ACTIVE STORE ROUTE BUTTON -->
        <a href="https://yekhareedo.in" class="btn" target="_blank">Visit Yekhareedo.in</a>
    </div>

</body>
</html>
