<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ergonomic Work Setup - Coming Soon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 15px; color: #38bdf8; font-weight: 700; }
        p { font-size: 1.1rem; color: #94a3b8; margin-bottom: 30px; line-height: 1.6; }
        .form-container {
            width: 100%;
            height: 420px; 
            overflow: hidden;
            border-radius: 8px;
            background: transparent;
        }
        iframe {
            width: 100%;
            height: 1000px; 
            border: none;
            margin-top: -340px; /* Perfectly bypasses the header */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ergonomic Work Setup</h1>
        <p>We are busy building a space dedicated to healthy, comfortable, and highly productive workspaces. Sign up below to be notified the moment we launch!</p>
        
        <div class="form-container">
            <iframe src="https://yekhareedo.in" title="Sign Up Form" scrolling="no"></iframe>
        </div>
    </div>

</body>
</html>
